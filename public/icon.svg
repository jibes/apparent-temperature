<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gefühlte Temperatur">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#222748"/>
      <stop offset="0.55" stop-color="#12152a"/>
      <stop offset="1" stop-color="#0a0c16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.74" cy="0.26" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.55" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="merc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- sun -->
  <g stroke="url(#sun)" stroke-width="20" stroke-linecap="round">
    <line x1="366" y1="78"  x2="366" y2="44"/>
    <line x1="366" y1="246" x2="366" y2="228"/>
    <line x1="282" y1="162" x2="258" y2="162"/>
    <line x1="474" y1="162" x2="450" y2="162"/>
    <line x1="306" y1="102" x2="289" y2="85"/>
    <line x1="443" y1="239" x2="426" y2="222"/>
    <line x1="306" y1="222" x2="289" y2="239"/>
    <line x1="443" y1="85"  x2="426" y2="102"/>
  </g>
  <circle cx="366" cy="162" r="56" fill="url(#sun)"/>

  <!-- thermometer -->
  <path d="M168 92
           a48 48 0 0 1 48 48
           v168
           a76 76 0 1 1 -96 0
           v-168
           a48 48 0 0 1 48 -48 z"
        fill="#0d0f18" stroke="#e6e9f5" stroke-width="20"/>
  <circle cx="168" cy="372" r="46" fill="url(#merc)"/>
  <rect x="156" y="196" width="24" height="172" rx="12" fill="url(#merc)"/>
  <g stroke="#e6e9f5" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="206" y1="172" x2="226" y2="172"/>
    <line x1="206" y1="212" x2="226" y2="212"/>
    <line x1="206" y1="252" x2="226" y2="252"/>
  </g>
</svg>
